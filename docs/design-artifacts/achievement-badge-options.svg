<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
  <defs>
    <style>
      .bg{fill:#090b10}.panel{fill:#111722;stroke:#283244;stroke-width:2}.muted{fill:#8b98a8}.text{fill:#e6edf5;font-family:Inter,Segoe UI,Arial,sans-serif}.title{font-size:54px;font-weight:800;letter-spacing:-2px}.h2{font-size:34px;font-weight:800}.body{font-size:22px}.small{font-size:15px;letter-spacing:2px;text-transform:uppercase}.name{font-size:24px;font-weight:800}.desc{font-size:16px}.copper{stroke:#b87333;fill:none}.silver{stroke:#c0c7d2;fill:none}.gold{stroke:#f2c94c;fill:none}.diamond{stroke:#67e8f9;fill:none}.olympian{stroke:#c084fc;fill:none}.copperFill{fill:#b87333}.silverFill{fill:#c0c7d2}.goldFill{fill:#f2c94c}.diamondFill{fill:#67e8f9}.olympianFill{fill:#c084fc}.locked{opacity:.45}.badgeText{font-size:14px;font-weight:700}.thin{stroke-width:2}.thick{stroke-width:4}.glowD{filter:url(#glowD)}.glowG{filter:url(#glowG)}
    </style>
    <filter id="glowD"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowG"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect class="bg" width="1800" height="1220"/>
  <circle cx="180" cy="20" r="320" fill="#67e8f9" opacity=".08"/>
  <text class="text title" x="70" y="85">Hermes Achievements badge graphics options</text>
  <text class="muted body" x="70" y="125">Static visual artifact: choose D1, D2, or D3-lite before live dashboard graphics are wired in.</text>

  <text class="text h2" x="70" y="205">D1 — Category Glyphs</text>
  <text class="muted body" x="70" y="238">Clean and restrained. One symbol per category; fastest to implement, least collectible.</text>
  <g transform="translate(70 270)">
    <g><rect class="panel" width="320" height="210"/><rect class="copperFill" width="320" height="5"/><rect x="24" y="24" width="62" height="62" fill="#1b1510" stroke="#b87333" stroke-width="2"/><path class="copper thick" d="M55 34v42M34 55h42M40 40l30 30M70 40 40 70"/><text class="text name" x="24" y="125">Toolchain Maxxer</text><text class="muted desc" x="24" y="153">Agent Autonomy glyph</text><text class="text badgeText" x="24" y="188" fill="#b87333">COPPER</text></g>
    <g transform="translate(350 0)"><rect class="panel" width="320" height="210"/><rect class="silverFill" width="320" height="5"/><rect x="24" y="24" width="62" height="62" fill="#121820" stroke="#c0c7d2" stroke-width="2"/><path class="silver thick" d="M55 31 32 75h46L55 31Z M55 45v16 M55 69h.1"/><text class="text name" x="24" y="125">Red Text</text><text class="muted desc" x="24" y="153">Debugging glyph</text><text class="text badgeText" x="24" y="188" fill="#c0c7d2">SILVER</text></g>
    <g transform="translate(700 0)"><rect class="panel" width="320" height="210"/><rect class="goldFill" width="320" height="5"/><rect x="24" y="24" width="62" height="62" fill="#201b0a" stroke="#f2c94c" stroke-width="2"/><path class="gold thick" d="M35 75 75 35M50 35h25v25M34 45h18M34 58h12M34 70h18"/><text class="text name" x="24" y="125">Vibe Architect</text><text class="muted desc" x="24" y="153">Vibe Coding glyph</text><text class="text badgeText" x="24" y="188" fill="#f2c94c">GOLD</text></g>
    <g transform="translate(1050 0)"><rect class="panel" width="320" height="210"/><rect class="diamondFill" width="320" height="5"/><rect x="24" y="24" width="62" height="62" fill="#07191d" stroke="#67e8f9" stroke-width="2"/><path class="diamond thick" d="M55 28v54M42 38c18 0 14 12 30 12M42 72c18 0 14-12 30-12M45 48h20M45 62h20"/><text class="text name" x="24" y="125">Skillsmith</text><text class="muted desc" x="24" y="153">Hermes glyph</text><text class="text badgeText" x="24" y="188" fill="#67e8f9">DIAMOND</text></g>
  </g>

  <text class="text h2" x="70" y="565">D2 — Per-achievement Icons</text>
  <text class="muted body" x="70" y="598">Each card gets a custom glyph. More expressive; tiers still mostly color and border.</text>
  <g transform="translate(70 630)">
    <g><rect class="panel" width="320" height="210"/><path class="copper thick glowG" d="M70 25c26 32 3 44 30 72 13 13 19 26 19 42 0 29-22 49-49 49s-49-20-49-49c0-19 12-35 28-51 16-16 21-35 21-63Z"/><text class="text name" x="24" y="125">Let Him Cook</text><text class="muted desc" x="24" y="153">Flame icon</text><text class="text badgeText" x="24" y="188" fill="#b87333">COPPER</text></g>
    <g transform="translate(350 0)"><rect class="panel" width="320" height="210"/><path class="silver thick" d="M25 95h42l17-52 32 94 20-42h42M20 30h160v130H20z"/><text class="text name" x="24" y="125">Stack Sommelier</text><text class="muted desc" x="24" y="153">Trace icon</text><text class="text badgeText" x="24" y="188" fill="#c0c7d2">SILVER</text></g>
    <g transform="translate(700 0)"><rect class="panel" width="320" height="210"/><path class="gold thick glowG" d="M35 145 145 35M80 35h65v65M35 55h42M35 82h28M35 110h44"/><text class="text name" x="24" y="125">Ship First</text><text class="muted desc" x="24" y="153">Rocket cursor icon</text><text class="text badgeText" x="24" y="188" fill="#f2c94c">GOLD</text></g>
    <g transform="translate(1050 0)"><rect class="panel" width="320" height="210"/><path class="diamond thick glowD" d="M90 20 160 75 130 175H50L20 75 90 20Z M20 75h140M60 75l30 100 30-100M55 75l35-55 35 55"/><text class="text name" x="24" y="125">Context Dragon</text><text class="muted desc" x="24" y="153">Diamond icon</text><text class="text badgeText" x="24" y="188" fill="#67e8f9">DIAMOND</text></g>
  </g>

  <text class="text h2" x="70" y="925">D3-lite — Crest System</text>
  <text class="muted body" x="70" y="958">Recommended: collectible badge frame. Per-achievement glyph + tier-specific crest shape + glow.</text>
  <g transform="translate(70 990)">
    <g><rect class="panel" width="320" height="190"/><polygon points="70,15 125,45 125,105 70,135 15,105 15,45" fill="#080b11" stroke="#b87333" stroke-width="4"/><path class="copper thick" d="M70 30c16 20 2 27 19 44 8 8 11 15 11 25 0 17-13 29-30 29s-30-12-30-29c0-12 7-21 17-31 10-10 13-21 13-38Z"/><text class="text name" x="24" y="158">Let Him Cook</text></g>
    <g transform="translate(350 0)"><rect class="panel" width="320" height="190"/><polygon points="70,15 125,45 125,105 70,135 15,105 15,45" fill="#080b11" stroke="#c0c7d2" stroke-width="4"/><path class="silver thick" d="M35 100h70M40 100V35h60v65M52 58h36M52 76h24"/><text class="text name" x="24" y="158">File Archaeologist</text></g>
    <g transform="translate(700 0)"><rect class="panel" width="320" height="190"/><circle cx="70" cy="75" r="58" fill="#080b11" stroke="#f2c94c" stroke-width="5"/><path class="gold thick glowG" d="M28 94c32 0 32-50 84-50M28 110h84"/><text class="text name" x="24" y="158">Subagent Commander</text></g>
    <g transform="translate(1050 0)"><rect class="panel" width="320" height="190"/><polygon points="70,15 130,55 110,135 30,135 10,55" fill="#080b11" stroke="#67e8f9" stroke-width="5"/><path class="diamond thick glowD" d="M70 30 110 60 92 120H48L30 60 70 30Z M30 60h80M52 60l18 60 18-60"/><text class="text name" x="24" y="158">Context Dragon</text></g>
  </g>
</svg>
